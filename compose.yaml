services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: patchcord/frontend
    ports:
      - 8080:8080

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - 5173:5173
    develop:
      watch:
        - path: ./src
          target: /app/src
          action: sync
        - path: ./package.json
          target: /app/package.json
          action: restart
        - path: ./vite.config.js
          target: /app/vite.config.js
          action: restart

  app-test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["npm", "run", "test:unit"]
