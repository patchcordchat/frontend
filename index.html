<!doctype html>
<html lang="en" class="theme-dark">
  <head>
    <meta charset="UTF-8" />

    <!--App Title-->
    <title>Patchcord</title>
    <meta name="apple-mobile-web-app-title" content="Patchcord" />

    <!--App Scaling-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!--App Icons-->
    <link rel="icon" type="image/x-icon" sizes="32x32" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg" />
    <link rel="apple-touch-icon" type="image/png" href="/favicon.png" />

    <!--Open Graph-->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Patchcord" />
    <meta property="og:title" content="Patchcord - Групповой чат, где всегда весело" />
    <meta
      property="og:description"
      content="Patchcord отлично подходит для игр и общения с друзьями или даже создание всемирного сообщества. Настройте свое собственное пространство для общения, игр и времяпрепровождения."
    />
    <meta property="og:image" content="/images/og_image.jpg" />
    <meta property="og:url" content="https://patchcord.org/" />

    <!--Theme Color-->
    <meta name="theme-color" content="#000000" />

    <!--App Manifest-->
    <link rel="manifest" href="/manifest.webmanifest" />

    <style>
      noscript {
        background: #f1f4f9;
        color: #929397;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
      noscript > div {
        padding: 12px;
        display: flex;
        font-family: 'Open Sans', sans-serif;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      noscript > div > h1 {
        margin: 8px 0;
        text-transform: uppercase;
        font-size: 20px;
        font-weight: 700;
      }
      noscript > div > p {
        margin: 4px 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app-mount"></div>

    <div id="floating"></div>

    <script type="module" src="/src/main.ts"></script>

    <noscript>
      <div>
        <h1>Упс! JavaScript решил немного вздремнуть...</h1>
        <p>
          Похоже, ваш JavaScript отключен. Пожалуйста, включите JavaScript в настройках вашего
          браузера.
        </p>
      </div>
    </noscript>
  </body>
</html>
